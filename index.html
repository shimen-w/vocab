<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安徽专升本 · 词汇记忆系统</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0f1a;
  --bg-surface: #141b2b;
  --bg-card: #1a2338;
  --bg-card-back: #1c2541;
  --bg-sidebar: #0d1322;
  --amber: #e2a847;
  --amber-light: #f0c96d;
  --amber-dim: #8b6914;
  --gold-glow: rgba(226, 168, 71, 0.15);
  --text-primary: #ede4d3;
  --text-secondary: #a89e8c;
  --text-muted: #6b6458;
  --border-subtle: rgba(226, 168, 71, 0.12);
  --border-active: rgba(226, 168, 71, 0.4);
  --success: #6b9e7a;
  --success-bg: rgba(107, 158, 122, 0.12);
  --danger: #c4686b;
  --danger-bg: rgba(196, 104, 107, 0.12);
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --transition-flip: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-subtle);
  --shadow-glow: 0 0 40px var(--gold-glow);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-ui);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(226, 168, 71, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 20%, rgba(226, 168, 71, 0.03) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 80%, rgba(200, 180, 150, 0.02) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  background-repeat: repeat;
  pointer-events: none;
  z-index: 0;
}

.app-container {
  display: flex;
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* ============= SIDEBAR ============= */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.sidebar-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--border-subtle);
}

.sidebar-header h1 {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--amber-light);
  letter-spacing: 0.02em;
  line-height: 1.3;
}

.sidebar-header .subtitle {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
  letter-spacing: 0.06em;
}

/* Progress section */
.progress-section {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border-subtle);
}

.progress-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
}

.progress-label span:last-child {
  font-family: var(--font-mono);
  color: var(--amber-light);
  font-size: 13px;
}

.progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber-dim), var(--amber-light));
  border-radius: 2px;
  transition: width 0.5s ease;
}

.stats-row {
  display: flex;
  gap: 16px;
  margin-top: 12px;
}

.stat-item {
  text-align: center;
  flex: 1;
}

.stat-value {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 500;
  color: var(--amber-light);
}

.stat-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* Category list */
.category-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.category-nav::-webkit-scrollbar { width: 3px; }
.category-nav::-webkit-scrollbar-track { background: transparent; }
.category-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

.category-group { margin-bottom: 4px; }

.category-group-title {
  padding: 12px 24px 6px;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-weight: 600;
}

.category-item {
  display: flex;
  align-items: center;
  padding: 9px 24px;
  cursor: pointer;
  transition: all var(--transition-smooth);
  border-left: 2px solid transparent;
  gap: 10px;
  font-size: 13px;
  color: var(--text-secondary);
}

.category-item:hover {
  background: rgba(226, 168, 71, 0.04);
  color: var(--text-primary);
}

.category-item.active {
  background: rgba(226, 168, 71, 0.08);
  border-left-color: var(--amber);
  color: var(--amber-light);
}

.category-item .root-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  background: rgba(226, 168, 71, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--amber-light);
  flex-shrink: 0;
}

.category-item .root-info { flex: 1; min-width: 0; }

.category-item .root-name {
  font-weight: 600;
  font-family: var(--font-mono);
  font-size: 12px;
}

.category-item .root-meaning {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
}

.category-item .word-count {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ============= MAIN ============= */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Section tabs */
.section-tabs {
  display: flex;
  gap: 6px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-surface);
}

.section-tab {
  padding: 8px 18px;
  border: 1px solid var(--border-subtle);
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  border-radius: 20px;
  transition: all var(--transition-smooth);
  font-family: var(--font-ui);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.section-tab:hover {
  border-color: var(--border-active);
  color: var(--text-primary);
}

.section-tab.active {
  background: rgba(226, 168, 71, 0.12);
  border-color: var(--amber);
  color: var(--amber-light);
}

.section-tab .tab-icon { font-size: 15px; }

/* Breadcrumb bar */
.breadcrumb-bar {
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-subtle);
}

.breadcrumb {
  font-size: 14px;
  color: var(--text-muted);
}

.breadcrumb .br-sep {
  margin: 0 8px;
  color: var(--text-muted);
  opacity: 0.4;
}

.breadcrumb .br-section {
  color: var(--text-secondary);
}

.breadcrumb .br-category {
  color: var(--amber-light);
  font-weight: 600;
}

.mode-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-surface);
  padding: 3px;
  border-radius: var(--radius-sm);
}

.mode-tab {
  padding: 6px 14px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
  transition: all var(--transition-smooth);
  font-family: var(--font-ui);
}

.mode-tab:hover { color: var(--text-primary); }
.mode-tab.active {
  background: rgba(226, 168, 71, 0.15);
  color: var(--amber-light);
}

/* Fade transition */
.study-content {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.study-content.fade-out { opacity: 0; transform: translateY(6px); }
.study-content.fade-in { opacity: 1; transform: translateY(0); transition: all 0.25s ease; }

/* Study area */
.study-area {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  perspective: 1200px;
}

/* Card */
.card-container {
  width: 420px;
  height: 280px;
  position: relative;
  cursor: pointer;
}

.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform var(--transition-flip);
}

.card-inner.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
}

.card-front {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-card), var(--shadow-glow);
}

.card-back {
  background: var(--bg-card-back);
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-card);
  transform: rotateY(180deg);
}

.card-word {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 700;
  color: var(--amber-light);
  letter-spacing: 0.02em;
  line-height: 1;
}

.card-phonetic {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 8px;
  letter-spacing: 0.04em;
  min-height: 20px;
}

.card-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 16px;
  letter-spacing: 0.05em;
  opacity: 0.6;
}

.card-meaning {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text-primary);
  text-align: center;
  line-height: 1.6;
}

.card-root-ref {
  font-size: 13px;
  color: var(--amber-dim);
  margin-top: 12px;
  font-family: var(--font-mono);
  text-align: center;
}

.card-example {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 16px;
  text-align: center;
  font-style: italic;
  line-height: 1.5;
}

/* Card navigation */
.card-nav {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-top: 32px;
}

.nav-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-smooth);
  font-size: 18px;
}

.nav-btn:hover {
  border-color: var(--border-active);
  color: var(--amber-light);
  background: rgba(226, 168, 71, 0.08);
}

.nav-btn:active { transform: scale(0.95); }

.card-counter {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
  min-width: 80px;
  text-align: center;
}

/* Action buttons */
.action-row {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.action-btn {
  padding: 10px 20px;
  border-radius: 20px;
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  transition: all var(--transition-smooth);
  font-family: var(--font-ui);
  display: flex;
  align-items: center;
  gap: 6px;
}

.action-btn:hover {
  border-color: var(--border-active);
  color: var(--text-primary);
}

.action-btn.know {
  border-color: rgba(107, 158, 122, 0.3);
  color: var(--success);
}

.action-btn.know:hover {
  background: var(--success-bg);
  border-color: var(--success);
}

.action-btn.dunno {
  border-color: rgba(196, 104, 107, 0.3);
  color: var(--danger);
}

.action-btn.dunno:hover {
  background: var(--danger-bg);
  border-color: var(--danger);
}

/* Kbd hints */
.kbd-hints {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.kbd-hint {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.03em;
}

.kbd-hint kbd {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--text-muted);
  font-family: var(--font-mono);
  font-size: 10px;
}

/* ============= GRID VIEW ============= */
.word-grid {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  padding: 16px 24px;
  overflow-y: auto;
  align-content: start;
}

.word-grid::-webkit-scrollbar { width: 3px; }
.word-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

.grid-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 18px;
  cursor: pointer;
  transition: all var(--transition-smooth);
  position: relative;
  animation: gridFadeIn 0.4s ease both;
}

@keyframes gridFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.grid-card:hover {
  border-color: var(--border-active);
  background: var(--bg-card-back);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.grid-card .word {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  color: var(--amber-light);
}

.grid-card .phonetic {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
  min-height: 16px;
}

.grid-card .meaning-zh {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.5;
  letter-spacing: 0.02em;
}

.grid-card .status-dot {
  position: absolute;
  top: 12px; right: 12px;
  width: 8px; height: 8px;
  border-radius: 50%;
}

.status-dot.known { background: var(--success); }
.status-dot.learning { background: var(--amber); }
.status-dot.new { background: transparent; border: 1px solid var(--text-muted); }

/* ============= TOAST ============= */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card);
  border: 1px solid var(--border-active);
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 13px;
  color: var(--amber-light);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 100;
  pointer-events: none;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ============= MOBILE FAB ============= */
.mobile-menu-btn {
  display: none;
  position: fixed;
  bottom: 20px; right: 20px;
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--amber);
  color: var(--bg-deep);
  border: none;
  font-size: 22px;
  cursor: pointer;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  transition: all var(--transition-smooth);
}

.mobile-menu-btn:active { transform: scale(0.9); }

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 150;
}

.sidebar-overlay.open { display: block; }

/* ============= RESPONSIVE ============= */
@media (max-width: 768px) {
  .sidebar { width: 260px; min-width: 260px; }
  .card-container { width: 320px; height: 220px; }
  .card-word { font-size: 36px; }
  .card-meaning { font-size: 18px; }
  .section-tabs { padding: 10px 16px; }
  .section-tab { padding: 6px 14px; font-size: 12px; }
  .breadcrumb-bar { padding: 10px 16px; }
  .word-grid { padding: 12px 16px; grid-template-columns: 1fr; }
  .study-area { padding: 20px; }
}

@media (max-width: 560px) {
  .sidebar {
    position: fixed;
    left: -300px;
    top: 0;
    z-index: 160;
    transition: left 0.3s ease;
    width: 280px;
    min-width: 280px;
    height: 100vh;
  }
  .sidebar.open { left: 0; }
  .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
  .card-container { width: 280px; height: 200px; }
  .card-word { font-size: 30px; }
  .section-tab { padding: 5px 10px; font-size: 11px; }
  .section-tab .tab-label { display: none; }
  .section-tab .tab-icon { font-size: 18px; }
  .breadcrumb { font-size: 12px; }
}
</style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 id="sidebarTitle">词根词缀法</h1>
      <div class="subtitle" id="sidebarSubtitle">通过词根词缀系统记忆</div>
    </div>
    <div class="progress-section">
      <div class="progress-label">
        <span>当前板块进度</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-value" id="statKnown">0</div>
          <div class="stat-label">已掌握</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statLearning">0</div>
          <div class="stat-label">学习中</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">总计</div>
        </div>
      </div>
    </div>
    <nav class="category-nav" id="categoryNav"></nav>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <main class="main-content">
    <nav class="section-tabs" id="sectionTabs">
      <button class="section-tab active" data-section="roots_affixes" onclick="switchSection('roots_affixes')">
        <span class="tab-icon">&#9670;</span>
        <span class="tab-label">词根词缀法</span>
      </button>
      <button class="section-tab" data-section="high_frequency" onclick="switchSection('high_frequency')">
        <span class="tab-icon">&#9733;</span>
        <span class="tab-label">高频单词</span>
      </button>
      <button class="section-tab" data-section="essential" onclick="switchSection('essential')">
        <span class="tab-icon">&#9830;</span>
        <span class="tab-label">必备单词</span>
      </button>
    </nav>

    <div class="breadcrumb-bar">
      <div class="breadcrumb" id="breadcrumb">
        <span class="br-section">词根词缀法</span>
        <span class="br-sep">/</span>
        <span class="br-category">pre- (前, 预先)</span>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="flashcard" onclick="switchMode('flashcard')">卡片记忆</button>
        <button class="mode-tab" data-mode="grid" onclick="switchMode('grid')">列表浏览</button>
      </div>
    </div>

    <div class="study-content" id="studyContent">
      <div class="study-area" id="flashcardArea">
        <div style="text-align:center;">
          <div class="card-container" id="cardContainer" onclick="flipCard()">
            <div class="card-inner" id="cardInner">
              <div class="card-face card-front">
                <div class="card-word" id="cardWord">preview</div>
                <div class="card-phonetic" id="cardPhonetic">/pri:vju:/</div>
                <div class="card-hint">点击翻转查看释义</div>
              </div>
              <div class="card-face card-back">
                <div class="card-meaning" id="cardMeaning">n./v. 预览；预习</div>
                <div class="card-root-ref" id="cardRootRef">pre- (前) + view (看)</div>
                <div class="card-example" id="cardExample">Preview the chapter before class.</div>
              </div>
            </div>
          </div>
          <div class="card-nav">
            <button class="nav-btn" onclick="prevCard(event)" title="上一个">&#8592;</button>
            <span class="card-counter" id="cardCounter">1 / 8</span>

// ============ STATE ============
let currentSection = 'roots_affixes';
let currentCategoryIndex = 0;
let currentWordIndex = 0;
let currentMode = 'flashcard';
let wordStatuses = {};

function currentCategory() {
  return sections[currentSection].categories[currentCategoryIndex];
}

// ============ LOCALSTORAGE ============
function loadStatuses() {
  var v2 = localStorage.getItem('vocab_statuses_v2');
  if (v2) {
    wordStatuses = JSON.parse(v2);
    return;
  }
  var v1 = JSON.parse(localStorage.getItem('vocab_statuses') || '{}');
  if (Object.keys(v1).length > 0) {
    wordStatuses = { roots_affixes: v1, high_frequency: {}, essential: {} };
  } else {
    wordStatuses = { roots_affixes: {}, high_frequency: {}, essential: {} };
  }
  saveStatuses();
}

function saveStatuses() {
  var sectionIds = Object.keys(sections);
  for (var i = 0; i < sectionIds.length; i++) {
    var sectionId = sectionIds[i];
    if (!wordStatuses[sectionId]) wordStatuses[sectionId] = {};
    var cats = sections[sectionId].categories;
    for (var j = 0; j < cats.length; j++) {
      var words = cats[j].words;
      for (var k = 0; k < words.length; k++) {
        wordStatuses[sectionId][words[k].word] = words[k].status;
      }
    }
  }
  localStorage.setItem('vocab_statuses_v2', JSON.stringify(wordStatuses));
}

function initStatuses() {
  var sectionIds = Object.keys(sections);
  for (var i = 0; i < sectionIds.length; i++) {
    var sectionId = sectionIds[i];
    if (!wordStatuses[sectionId]) wordStatuses[sectionId] = {};
    var cats = sections[sectionId].categories;
    for (var j = 0; j < cats.length; j++) {
      var words = cats[j].words;
      for (var k = 0; k < words.length; k++) {
        var w = words[k];
        if (!(w.word in wordStatuses[sectionId])) {
          wordStatuses[sectionId][w.word] = w.status || 'new';
        }
        w.status = wordStatuses[sectionId][w.word];
      }
    }
  }
}

// ============ STATS ============
function getCategoryStats(cat) {
  var known = 0, learning = 0;
  for (var i = 0; i < cat.words.length; i++) {
    if (cat.words[i].status === 'known') known++;
    else if (cat.words[i].status === 'learning') learning++;
  }
  return { known: known, learning: learning, total: cat.words.length, newCount: cat.words.length - known - learning };
}

function getSectionStats(sectionId) {
  var section = sections[sectionId];
  var known = 0, learning = 0, total = 0;
  for (var i = 0; i < section.categories.length; i++) {
    var s = getCategoryStats(section.categories[i]);
    known += s.known; learning += s.learning; total += s.total;
  }
  return { known: known, learning: learning, total: total };
}

// ============ SIDEBAR ============
var sidebarConfig = {
  roots_affixes: { groupLabels: { prefix: '前缀', root: '词根', suffix: '后缀' }, groupOrder: ['prefix','root','suffix'] },
  high_frequency: { groupLabels: { frequency: '频次分区' }, groupOrder: ['frequency'] },
  essential: { groupLabels: { essential: '字母分区' }, groupOrder: ['essential'] }
};

function renderSidebar() {
  var nav = document.getElementById('categoryNav');
  var config = sidebarConfig[currentSection];
  var cats = sections[currentSection].categories;
  var html = '';
  var currentType = '';

  for (var idx = 0; idx < cats.length; idx++) {
    var cat = cats[idx];
    if (cat.type !== currentType) {
      currentType = cat.type;
      var label = config.groupLabels[currentType] || currentType;
      html += '<div class="category-group"><div class="category-group-title">' + label + '</div>';
    }
    var stats = getCategoryStats(cat);
    html += '<div class="category-item ' + (idx === currentCategoryIndex ? 'active' : '') + '" onclick="selectCategory(' + idx + ')">';
    var icon = (cat.root || '?').replace(/[-/]/g, '').substring(0, 4);
    html += '<div class="root-icon">' + icon + '</div>';
    html += '<div class="root-info"><div class="root-name">' + cat.root + '</div>';
    html += '<div class="root-meaning">' + cat.meaning + '</div></div>';
    html += '<div class="word-count">' + stats.total + '</div></div>';
  }
  nav.innerHTML = html + '</div>';
}

function updateSidebarHeader() {
  var sec = sections[currentSection];
  document.getElementById('sidebarTitle').textContent = sec.label;
  document.getElementById('sidebarSubtitle').textContent = sec.description;
}

function updateStats() {
  var stats = getSectionStats(currentSection);
  var pct = stats.total > 0 ? Math.round((stats.known / stats.total) * 100) : 0;
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statKnown').textContent = stats.known;
  document.getElementById('statLearning').textContent = stats.learning;
  document.getElementById('statTotal').textContent = stats.total;
}

// ============ BREADCRUMB ============
function updateBreadcrumb() {
  var sec = sections[currentSection];
  var cat = currentCategory();
  document.getElementById('breadcrumb').innerHTML =
    '<span class="br-section">' + sec.label + '</span>' +
    '<span class="br-sep">/</span>' +
    '<span class="br-category">' + cat.root + ' (' + cat.meaning + ')</span>';
}

// ============ CARD & GRID ============
function renderCard() {
  var cat = currentCategory();
  var word = cat.words[currentWordIndex];
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('cardWord').textContent = word.word;
  document.getElementById('cardPhonetic').textContent = word.phonetic || '';
  document.getElementById('cardMeaning').textContent = word.meaning || '释义待补充';

  var label = currentSection === 'roots_affixes' ? '' : '分类: ';
  document.getElementById('cardRootRef').textContent = word.breakdown ? label + word.breakdown : '';
  document.getElementById('cardExample').textContent = word.example || '';
  document.getElementById('cardCounter').textContent = (currentWordIndex + 1) + ' / ' + cat.words.length;
}

function renderGrid() {
  var cat = currentCategory();
  var grid = document.getElementById('gridArea');
  var label = currentSection === 'roots_affixes' ? '' : '分类: ';
  var html = '';
  for (var i = 0; i < cat.words.length; i++) {
    var w = cat.words[i];
    var statusClass = w.status === 'known' ? 'known' : w.status === 'learning' ? 'learning' : 'new';
    var delay = Math.min(i * 0.015, 0.5);
    html += '<div class="grid-card" style="animation-delay:' + delay + 's" onclick="currentWordIndex=' + i + '; switchMode(&quot;flashcard&quot;); renderCard();">' +
      '<div class="status-dot ' + statusClass + '"></div>' +
      '<div class="word">' + w.word + '</div>' +
      (w.phonetic ? '<div class="phonetic">' + w.phonetic + '</div>' : '') +
      (w.meaning ? '<div class="meaning-zh">' + w.meaning + '</div>' : '') +
      (w.breakdown ? '<div style="font-size:11px;color:var(--amber-dim);margin-top:6px;font-family:var(--font-mono)">' + label + ' ' + w.breakdown + '</div>' : '') +
      '</div>';
  }
  grid.innerHTML = html;
}

// ============ MODE SWITCH ============
function switchMode(mode) {
  currentMode = mode;
  var tabs = document.querySelectorAll('.mode-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  document.querySelector('[data-mode="' + mode + '"]').classList.add('active');
  document.getElementById('flashcardArea').style.display = mode === 'flashcard' ? 'flex' : 'none';
  document.getElementById('gridArea').style.display = mode === 'grid' ? 'grid' : 'none';
  if (mode === 'flashcard') renderCard();
  if (mode === 'grid') renderGrid();
}

// ============ SECTION SWITCH ============
function switchSection(sectionId) {
  if (currentSection === sectionId) return;
  currentSection = sectionId;
  currentCategoryIndex = 0;
  currentWordIndex = 0;

  var tabs = document.querySelectorAll('.section-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  document.querySelector('[data-section="' + sectionId + '"]').classList.add('active');

  var content = document.getElementById('studyContent');
  content.classList.add('fade-out');
  setTimeout(function() {
    updateSidebarHeader();
    renderSidebar();
    updateStats();
    updateBreadcrumb();
    if (currentMode === 'flashcard') renderCard();
    if (currentMode === 'grid') renderGrid();
    content.classList.remove('fade-out');
    content.classList.add('fade-in');
    setTimeout(function() { content.classList.remove('fade-in'); }, 300);
  }, 150);
}

// ============ CATEGORY SELECT ============
function selectCategory(idx) {
  currentCategoryIndex = idx;
  currentWordIndex = 0;
  updateBreadcrumb();
  renderSidebar();
  if (currentMode === 'flashcard') renderCard();
  if (currentMode === 'grid') renderGrid();
}

// ============ CARD ACTIONS ============
function flipCard() {
  document.getElementById('cardInner').classList.toggle('flipped');
}

function prevCard(e) {
  e.stopPropagation();
  var cat = currentCategory();
  currentWordIndex = (currentWordIndex - 1 + cat.words.length) % cat.words.length;
  renderCard();
}

function nextCard(e) {
  e.stopPropagation();
  var cat = currentCategory();
  currentWordIndex = (currentWordIndex + 1) % cat.words.length;
  renderCard();
}

function markWord(status, e) {
  e.stopPropagation();
  var word = currentCategory().words[currentWordIndex];
  word.status = status;
  saveStatuses();
  updateStats();
  renderSidebar();
  showToast(status === 'known' ? '✓ "' + word.word + '" 已标记为掌握' : '⟳ "' + word.word + '" 标记为学习中');
}

// ============ TOAST ============
function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(function() { toast.classList.remove('show'); }, 2000);
}

// ============ MOBILE SIDEBAR ============
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ============ KEYBOARD ============
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.ctrlKey || e.metaKey) {
    if (e.key === '1') { e.preventDefault(); switchSection('roots_affixes'); return; }
    if (e.key === '2') { e.preventDefault(); switchSection('high_frequency'); return; }
    if (e.key === '3') { e.preventDefault(); switchSection('essential'); return; }
  }

  switch (e.key) {
    case 'ArrowLeft': prevCard(e); break;
    case 'ArrowRight': nextCard(e); break;
    case ' ': e.preventDefault(); flipCard(); break;
    case '1': markWord('known', e); break;
    case '2': markWord('learning', e); break;
  }
});

// ============ INIT ============
loadStatuses();
initStatuses();
updateSidebarHeader();
renderSidebar();
updateStats();
updateBreadcrumb();
renderCard();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词根词缀 · 安徽专升本高频词汇</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0f1a;
  --bg-surface: #141b2b;
  --bg-card: #1a2338;
  --bg-card-back: #1c2541;
  --bg-sidebar: #0d1322;
  --amber: #e2a847;
  --amber-light: #f0c96d;
  --amber-dim: #8b6914;
  --gold-glow: rgba(226, 168, 71, 0.15);
  --text-primary: #ede4d3;
  --text-secondary: #a89e8c;
  --text-muted: #6b6458;
  --border-subtle: rgba(226, 168, 71, 0.12);
  --border-active: rgba(226, 168, 71, 0.4);
  --success: #6b9e7a;
  --success-bg: rgba(107, 158, 122, 0.12);
  --danger: #c4686b;
  --danger-bg: rgba(196, 104, 107, 0.12);
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --transition-flip: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-subtle);
  --shadow-glow: 0 0 40px var(--gold-glow);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-ui);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
}

/* Ambient background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(226, 168, 71, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 20%, rgba(226, 168, 71, 0.03) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 80%, rgba(200, 180, 150, 0.02) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Noise overlay for texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  background-repeat: repeat;
  pointer-events: none;
  z-index: 0;
}

.app-container {
  display: flex;
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* ============= SIDEBAR ============= */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border-subtle);
}

.sidebar-header h1 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--amber-light);
  letter-spacing: 0.02em;
  line-height: 1.3;
}

.sidebar-header .subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Progress section */
.progress-section {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border-subtle);
}

.progress-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
}

.progress-label span:last-child {
  font-family: var(--font-mono);
  color: var(--amber-light);
  font-size: 13px;
}

.progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber-dim), var(--amber-light));
  border-radius: 2px;
  transition: width 0.5s ease;
}

.stats-row {
  display: flex;
  gap: 16px;
  margin-top: 12px;
}

.stat-item {
  text-align: center;
  flex: 1;
}

.stat-value {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 500;
  color: var(--amber-light);
}

.stat-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* Category list */
.category-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.category-nav::-webkit-scrollbar {
  width: 3px;
}

.category-nav::-webkit-scrollbar-track {
  background: transparent;
}

.category-nav::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
}

.category-group {
  margin-bottom: 4px;
}

.category-group-title {
  padding: 12px 24px 6px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-weight: 600;
}

.category-item {
  display: flex;
  align-items: center;
  padding: 10px 24px;
  cursor: pointer;
  transition: all var(--transition-smooth);
  border-left: 2px solid transparent;
  gap: 10px;
  font-size: 13px;
  color: var(--text-secondary);
}

.category-item:hover {
  background: rgba(226, 168, 71, 0.04);
  color: var(--text-primary);
}

.category-item.active {
  background: rgba(226, 168, 71, 0.08);
  border-left-color: var(--amber);
  color: var(--amber-light);
}

.category-item .root-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  background: rgba(226, 168, 71, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--amber-light);
  flex-shrink: 0;
}

.category-item .root-info {
  flex: 1;
  min-width: 0;
}

.category-item .root-name {
  font-weight: 600;
  font-family: var(--font-mono);
  font-size: 13px;
}

.category-item .root-meaning {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}

.category-item .word-count {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ============= MAIN ============= */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.top-bar {
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-subtle);
}

.top-bar .current-category {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
}

.top-bar .current-category .meaning {
  font-size: 14px;
  color: var(--text-muted);
  font-family: var(--font-ui);
  margin-left: 8px;
}

.mode-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-surface);
  padding: 3px;
  border-radius: var(--radius-sm);
}

.mode-tab {
  padding: 6px 14px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
  transition: all var(--transition-smooth);
  font-family: var(--font-ui);
}

.mode-tab:hover { color: var(--text-primary); }

.mode-tab.active {
  background: rgba(226, 168, 71, 0.15);
  color: var(--amber-light);
}

/* Study area */
.study-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  perspective: 1200px;
}

/* Card */
.card-container {
  width: 420px;
  height: 280px;
  position: relative;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform var(--transition-flip);
}

.card-inner.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
}

.card-front {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-card), var(--shadow-glow);
}

.card-back {
  background: var(--bg-card-back);
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-card);
  transform: rotateY(180deg);
}

.card-word {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 700;
  color: var(--amber-light);
  letter-spacing: 0.02em;
  line-height: 1;
}

.card-phonetic {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 8px;
  letter-spacing: 0.04em;
}

.card-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 16px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  opacity: 0.6;
}

.card-meaning {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text-primary);
  text-align: center;
  line-height: 1.6;
}

.card-root-ref {
  font-size: 13px;
  color: var(--amber-dim);
  margin-top: 12px;
  font-family: var(--font-mono);
}

.card-example {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 16px;
  text-align: center;
  font-style: italic;
  line-height: 1.5;
}

/* Card navigation */
.card-nav {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-top: 32px;
}

.nav-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-smooth);
  font-size: 18px;
}

.nav-btn:hover {
  border-color: var(--border-active);
  color: var(--amber-light);
  background: rgba(226, 168, 71, 0.08);
}

.nav-btn:active { transform: scale(0.95); }

.card-counter {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
  min-width: 60px;
  text-align: center;
}

/* Action buttons */
.action-row {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.action-btn {
  padding: 10px 20px;
  border-radius: 20px;
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  transition: all var(--transition-smooth);
  font-family: var(--font-ui);
  display: flex;
  align-items: center;
  gap: 6px;
}

.action-btn:hover {
  border-color: var(--border-active);
  color: var(--text-primary);
}

.action-btn.know {
  border-color: rgba(107, 158, 122, 0.3);
  color: var(--success);
}

.action-btn.know:hover {
  background: var(--success-bg);
  border-color: var(--success);
}

.action-btn.dunno {
  border-color: rgba(196, 104, 107, 0.3);
  color: var(--danger);
}

.action-btn.dunno:hover {
  background: var(--danger-bg);
  border-color: var(--danger);
}

/* ============= GRID VIEW ============= */
.word-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  padding: 20px 32px;
  overflow-y: auto;
  flex: 1;
  align-content: start;
}

.word-grid::-webkit-scrollbar {
  width: 3px;
}

.word-grid::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
}

.grid-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition-smooth);
  position: relative;
}

.grid-card:hover {
  border-color: var(--border-active);
  background: var(--bg-card-back);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.grid-card .word {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--amber-light);
}

.grid-card .phonetic {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.grid-card .meaning-zh {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.5;
}

.grid-card .status-dot {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.status-dot.known { background: var(--success); }
.status-dot.learning { background: var(--amber); }
.status-dot.new { background: transparent; border: 1px solid var(--text-muted); }

/* ============= EMPTY STATE ============= */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  gap: 12px;
}

.empty-state .icon {
  font-size: 48px;
  opacity: 0.3;
}

.empty-state p {
  font-size: 14px;
  letter-spacing: 0.04em;
}

/* ============= TOAST ============= */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card);
  border: 1px solid var(--border-active);
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 13px;
  color: var(--amber-light);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 100;
  pointer-events: none;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ============= RESPONSIVE ============= */
@media (max-width: 768px) {
  .sidebar {
    width: 260px;
    min-width: 260px;
  }
  .card-container {
    width: 320px;
    height: 220px;
  }
  .card-word {
    font-size: 36px;
  }
  .card-meaning {
    font-size: 18px;
  }
  .top-bar {
    padding: 16px 20px;
  }
  .word-grid {
    padding: 12px 16px;
    grid-template-columns: 1fr;
  }
}

@media (max-width: 560px) {
  .sidebar {
    display: none;
  }
  .card-container {
    width: 280px;
    height: 200px;
  }
  .card-word {
    font-size: 30px;
  }
}
</style>
</head>
<body>

<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>词根词缀法</h1>
      <div class="subtitle">安徽专升本 · 高频词汇</div>
    </div>

    <div class="progress-section">
      <div class="progress-label">
        <span>学习进度</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-value" id="statKnown">0</div>
          <div class="stat-label">已掌握</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statLearning">0</div>
          <div class="stat-label">学习中</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">总计</div>
        </div>
      </div>
    </div>

    <nav class="category-nav" id="categoryNav">
      <!-- Rendered by JS -->
    </nav>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="top-bar">
      <div class="current-category" id="currentCategoryLabel">
        前缀 <span class="meaning">pre- (前, 预先)</span>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="flashcard" onclick="switchMode('flashcard')">卡片记忆</button>
        <button class="mode-tab" data-mode="grid" onclick="switchMode('grid')">列表浏览</button>
      </div>
    </div>

    <!-- Flashcard mode -->
    <div class="study-area" id="flashcardArea">
      <div style="text-align:center;">
        <div class="card-container" id="cardContainer" onclick="flipCard()">
          <div class="card-inner" id="cardInner">
            <div class="card-face card-front">
              <div class="card-word" id="cardWord">preview</div>
              <div class="card-phonetic" id="cardPhonetic">/ˈpriːvjuː/</div>
              <div class="card-hint">点击翻转查看释义</div>
            </div>
            <div class="card-face card-back">
              <div class="card-meaning" id="cardMeaning">n./v. 预览；预习</div>
              <div class="card-root-ref" id="cardRootRef">pre- (前) + view (看)</div>
              <div class="card-example" id="cardExample">Preview the chapter before class.</div>
            </div>
          </div>
        </div>

        <div class="card-nav">
          <button class="nav-btn" onclick="prevCard(event)" title="上一个">←</button>
          <span class="card-counter" id="cardCounter">1 / 8</span>
          <button class="nav-btn" onclick="nextCard(event)" title="下一个">→</button>
        </div>

        <div class="action-row">
          <button class="action-btn dunno" onclick="markWord('learning', event)">
            <span>⟳</span> 还不熟
          </button>
          <button class="action-btn know" onclick="markWord('known', event)">
            <span>✓</span> 已掌握
          </button>
        </div>
      </div>
    </div>

    <!-- Grid mode -->
    <div class="word-grid" id="gridArea" style="display:none;">
      <!-- Rendered by JS -->
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
const vocabularyData = [
  {
    type: 'prefix',
    root: 'pre-',
    meaning: '前, 预先',
    words: [
      { word: 'preview', phonetic: '/ˈpriːvjuː/', meaning: 'n./v. 预览；预习', breakdown: 'pre- (前) + view (看)', example: 'Preview the chapter before class.', status: 'new' },
      { word: 'predict', phonetic: '/prɪˈdɪkt/', meaning: 'v. 预测；预言', breakdown: 'pre- (前) + dict (说)', example: 'Experts predict economic growth.', status: 'new' },
      { word: 'preface', phonetic: '/ˈprefəs/', meaning: 'n. 前言；序言', breakdown: 'pre- (前) + face (说)', example: 'Read the preface of the book.', status: 'new' },
      { word: 'precaution', phonetic: '/prɪˈkɔːʃən/', meaning: 'n. 预防；警惕', breakdown: 'pre- (前) + caution (小心)', example: 'Take precautions against fire.', status: 'new' },
      { word: 'preceding', phonetic: '/prɪˈsiːdɪŋ/', meaning: 'adj. 在前的；前面的', breakdown: 'pre- (前) + ced (走) + -ing', example: 'See the preceding chapter.', status: 'new' },
      { word: 'prejudice', phonetic: '/ˈpredʒʊdɪs/', meaning: 'n. 偏见；成见', breakdown: 'pre- (前) + judice (判断)', example: 'overcome racial prejudice', status: 'new' },
      { word: 'prescribe', phonetic: '/prɪˈskraɪb/', meaning: 'v. 开药方；规定', breakdown: 'pre- (前) + scribe (写)', example: 'The doctor prescribed medicine.', status: 'new' },
      { word: 'preliminary', phonetic: '/prɪˈlɪmɪnəri/', meaning: 'adj. 初步的；预备的', breakdown: 'pre- (前) + limin (门槛)', example: 'preliminary results', status: 'new' },
    ]
  },
  {
    type: 'prefix',
    root: 're-',
    meaning: '再, 重新, 回',
    words: [
      { word: 'review', phonetic: '/rɪˈvjuː/', meaning: 'v./n. 复习；回顾', breakdown: 're- (再) + view (看)', example: 'Review your notes daily.', status: 'new' },
      { word: 'return', phonetic: '/rɪˈtɜːn/', meaning: 'v./n. 返回；归还', breakdown: 're- (回) + turn (转)', example: 'return the book to the library', status: 'new' },

// ============ STATE ============
let currentCategoryIndex = 0;
let currentWordIndex = 0;
let currentMode = 'flashcard';
let wordStatuses = JSON.parse(localStorage.getItem('vocab_statuses') || '{}');

// Initialize statuses from data
vocabularyData.forEach(cat => {
  cat.words.forEach(w => {
    if (!(w.word in wordStatuses)) {
      wordStatuses[w.word] = w.status;
    }
    w.status = wordStatuses[w.word];
  });
});

function saveStatuses() {
  vocabularyData.forEach(cat => {
    cat.words.forEach(w => {
      wordStatuses[w.word] = w.status;
    });
  });
  localStorage.setItem('vocab_statuses', JSON.stringify(wordStatuses));
}

function getCategoryStats(cat) {
  let known = 0, learning = 0;
  cat.words.forEach(w => {
    if (w.status === 'known') known++;
    else if (w.status === 'learning') learning++;
  });
  return { known, learning, total: cat.words.length, newCount: cat.words.length - known - learning };
}

function getAllStats() {
  let known = 0, learning = 0, total = 0;
  vocabularyData.forEach(cat => {
    const s = getCategoryStats(cat);
    known += s.known;
    learning += s.learning;
    total += s.total;
  });
  return { known, learning, total };
}

// ============ RENDER ============
function renderSidebar() {
  const nav = document.getElementById('categoryNav');
  const typeLabels = { prefix: '前缀', root: '词根', suffix: '后缀' };
  let html = '';
  let currentType = '';

  vocabularyData.forEach((cat, idx) => {
    if (cat.type !== currentType) {
      currentType = cat.type;
      html += `<div class="category-group"><div class="category-group-title">${typeLabels[currentType]}</div>`;
    }
    const stats = getCategoryStats(cat);
    html += `
      <div class="category-item ${idx === currentCategoryIndex ? 'active' : ''}" onclick="selectCategory(${idx})">
        <div class="root-icon">${cat.root.replace(/[-/]/g, '')}</div>
        <div class="root-info">
          <div class="root-name">${cat.root}</div>
          <div class="root-meaning">${cat.meaning}</div>
        </div>
        <div class="word-count">${stats.total}</div>
      </div>`;
  });

  nav.innerHTML = html + '</div>';
}

function updateStats() {
  const stats = getAllStats();
  const pct = stats.total > 0 ? Math.round((stats.known / stats.total) * 100) : 0;
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statKnown').textContent = stats.known;
  document.getElementById('statLearning').textContent = stats.learning;
  document.getElementById('statTotal').textContent = stats.total;
}

function updateTopBar() {
  const cat = vocabularyData[currentCategoryIndex];
  const typeLabels = { prefix: '前缀', root: '词根', suffix: '后缀' };
  document.getElementById('currentCategoryLabel').innerHTML = `
    ${typeLabels[cat.type]} <span class="meaning">${cat.root} (${cat.meaning})</span>`;
}

function renderCard() {
  const cat = vocabularyData[currentCategoryIndex];
  const word = cat.words[currentWordIndex];
  const cardInner = document.getElementById('cardInner');
  cardInner.classList.remove('flipped');

  document.getElementById('cardWord').textContent = word.word;
  document.getElementById('cardPhonetic').textContent = word.phonetic;
  document.getElementById('cardMeaning').textContent = word.meaning;
  document.getElementById('cardRootRef').textContent = word.breakdown;
  document.getElementById('cardExample').textContent = word.example;
  document.getElementById('cardCounter').textContent = `${currentWordIndex + 1} / ${cat.words.length}`;
}

function renderGrid() {
  const cat = vocabularyData[currentCategoryIndex];
  const grid = document.getElementById('gridArea');
  grid.innerHTML = cat.words.map((w, i) => {
    const statusClass = w.status === 'known' ? 'known' : w.status === 'learning' ? 'learning' : 'new';
    return `
      <div class="grid-card" onclick="currentWordIndex=${i}; switchMode('flashcard'); renderCard();">
        <div class="status-dot ${statusClass}"></div>
        <div class="word">${w.word}</div>
        <div class="phonetic">${w.phonetic}</div>
        <div class="meaning-zh">${w.meaning}</div>
        <div style="font-size:11px;color:var(--amber-dim);margin-top:6px;font-family:var(--font-mono)">${w.breakdown}</div>
      </div>`;
  }).join('');
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  document.getElementById('flashcardArea').style.display = mode === 'flashcard' ? 'flex' : 'none';
  document.getElementById('gridArea').style.display = mode === 'grid' ? 'grid' : 'none';
  if (mode === 'flashcard') renderCard();
  if (mode === 'grid') renderGrid();
}

function selectCategory(idx) {
  currentCategoryIndex = idx;
  currentWordIndex = 0;
  updateTopBar();
  renderSidebar();
  if (currentMode === 'flashcard') renderCard();
  if (currentMode === 'grid') renderGrid();
}

function flipCard() {
  document.getElementById('cardInner').classList.toggle('flipped');
}

function prevCard(e) {
  e.stopPropagation();
  const cat = vocabularyData[currentCategoryIndex];
  currentWordIndex = (currentWordIndex - 1 + cat.words.length) % cat.words.length;
  renderCard();
}

function nextCard(e) {
  e.stopPropagation();
  const cat = vocabularyData[currentCategoryIndex];
  currentWordIndex = (currentWordIndex + 1) % cat.words.length;
  renderCard();
}

function markWord(status, e) {
  e.stopPropagation();
  const cat = vocabularyData[currentCategoryIndex];
  const word = cat.words[currentWordIndex];
  word.status = status;
  saveStatuses();
  updateStats();
  renderSidebar();
  showToast(status === 'known' ? `✓ "${word.word}" 已标记为掌握` : `⟳ "${word.word}" 标记为学习中`);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch (e.key) {
    case 'ArrowLeft': prevCard(e); break;
    case 'ArrowRight': nextCard(e); break;
    case ' ': e.preventDefault(); flipCard(); break;
    case '1': markWord('known', e); break;
    case '2': markWord('learning', e); break;
  }
});

// ============ INIT ============
renderSidebar();
updateStats();
updateTopBar();
renderCard();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专升本词汇记忆系统</title>
<meta name="description" content="安徽专升本英语词汇记忆系统，涵盖词根词缀法、高频单词、必备单词三大板块，支持闪卡记忆与列表浏览双模式。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:      #09101e;
  --bg-mid:       #0e1829;
  --bg-surface:   #131f35;
  --bg-card:      #18243d;
  --bg-card-hov:  #1c2942;
  --bg-sidebar:   #0b1120;
  --gold:         #e2a847;
  --gold-bright:  #f5c96d;
  --gold-dim:     #8b6820;
  --gold-glow:    rgba(226,168,71,0.16);
  --gold-border:  rgba(226,168,71,0.2);
  --gold-border2: rgba(226,168,71,0.42);
  --text-primary: #ede4d3;
  --text-sec:     #a89e8c;
  --text-muted:   #64605a;
  --green:        #6bc48a;
  --green-bg:     rgba(107,196,138,0.12);
  --red:          #e07070;
  --red-bg:       rgba(224,112,112,0.12);
  --r-sm: 6px; --r-md: 12px; --r-lg: 20px; --r-xl: 28px;
  --ff-display: 'Lora','Noto Serif SC',Georgia,serif;
  --ff-ui: 'Inter',-apple-system,system-ui,sans-serif;
  --ff-mono: 'JetBrains Mono','Consolas',monospace;
  --t-s: 0.25s cubic-bezier(0.4,0,0.2,1);
  --t-flip: 0.55s cubic-bezier(0.4,0.2,0.2,1);
  --t-b: 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff-ui);background:linear-gradient(180deg,#08101d 0%,#0b1423 34%,#0e1829 100%);color:var(--text-primary);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 68% 56% at 10% 52%,rgba(226,168,71,0.08) 0%,transparent 56%),radial-gradient(ellipse 42% 62% at 88% 10%,rgba(93,138,198,0.07) 0%,transparent 55%),linear-gradient(135deg,rgba(255,255,255,0.015),transparent 28%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(circle at center,black 42%,transparent 92%);opacity:.16;pointer-events:none;z-index:0}

/* ---- LAYOUT ---- */
.app{display:flex;height:100vh;position:relative;z-index:1}

/* ---- SIDEBAR ---- */
.sidebar{width:290px;min-width:290px;background:var(--bg-sidebar);border-right:1px solid var(--gold-border);display:flex;flex-direction:column;height:100vh;overflow:hidden;flex-shrink:0}
.sb-header{padding:18px 18px 14px;border-bottom:1px solid var(--gold-border)}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.sb-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;box-shadow:0 2px 12px rgba(226,168,71,0.3)}
.sb-title{font-family:var(--ff-display);font-size:16px;font-weight:700;color:var(--gold-bright);letter-spacing:.02em;line-height:1.3}
.sb-sub{font-size:10px;color:var(--text-muted);margin-top:2px;letter-spacing:.07em;text-transform:uppercase}

.prog-box{padding:12px 18px;border-bottom:1px solid var(--gold-border)}
.prog-top{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.prog-ring-wrap{position:relative;width:68px;height:68px;flex-shrink:0}
.prog-ring{width:100%;height:100%;transform:rotate(-90deg)}
.prog-ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:4.5}
.prog-ring-fill{fill:none;stroke:url(#progGrad);stroke-width:4.5;stroke-linecap:round;transition:stroke-dashoffset .7s ease;filter:url(#progGlow)}
.prog-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:15px;font-weight:600;color:var(--gold-bright)}
.prog-info{flex:1;min-width:0}
.prog-info .prog-lbl{font-size:10.5px;color:var(--text-muted);letter-spacing:.05em}
.stats-row{display:flex;gap:6px;margin-top:10px}
.stat-pill{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r-sm);padding:7px 4px;text-align:center;transition:border-color var(--t-s)}
.stat-pill:hover{border-color:var(--gold-border)}
.stat-val{font-family:var(--ff-mono);font-size:17px;font-weight:500;color:var(--gold-bright);line-height:1}
.stat-lbl{font-size:9px;color:var(--text-muted);letter-spacing:.06em;margin-top:2px}

.sb-search{padding:8px 18px;border-bottom:1px solid var(--gold-border)}
.search-wrap{position:relative}
.search-wrap::before{content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none}
.search-inp{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:var(--r-sm);padding:6px 9px 6px 26px;color:var(--text-primary);font-family:var(--ff-ui);font-size:12px;outline:none;transition:all var(--t-s)}
.search-inp::placeholder{color:var(--text-muted)}
.search-inp:focus{border-color:var(--gold-border2);background:rgba(226,168,71,0.04)}

.cat-nav{flex:1;overflow-y:auto;padding:4px 0;scroll-behavior:smooth}
.cat-nav::-webkit-scrollbar{width:3px}
.cat-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px}
.cat-group{margin-bottom:1px}
.cat-grp-hdr{display:flex;align-items:center;padding:9px 18px 4px;font-size:9px;letter-spacing:.1em;color:var(--text-muted);font-weight:600;text-transform:uppercase;cursor:pointer;user-select:none}
.cat-grp-hdr:hover{color:var(--text-sec)}
.cat-grp-chevron{margin-left:auto;font-size:8px;transition:transform var(--t-s);opacity:.5}
.cat-group.collapsed .cat-grp-chevron{transform:rotate(-90deg)}
.cat-group.collapsed .cat-grp-items{display:none}
.cat-item{display:flex;align-items:center;padding:7px 18px;cursor:pointer;transition:all var(--t-s);border-left:2px solid transparent;gap:9px;position:relative}
.cat-item:hover{background:rgba(226,168,71,0.04)}
.cat-item.active{border-left-color:var(--gold);background:rgba(226,168,71,0.07)}
.cat-icon{width:30px;height:30px;border-radius:var(--r-sm);background:rgba(226,168,71,0.07);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:9px;color:var(--gold);flex-shrink:0;transition:all var(--t-s);letter-spacing:-.02em;overflow:hidden}
.cat-item.active .cat-icon,.cat-item:hover .cat-icon{background:rgba(226,168,71,0.14);border-color:var(--gold);color:var(--gold-bright)}
.cat-info{flex:1;min-width:0}
.cat-name{font-weight:600;font-family:var(--ff-mono);font-size:11px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-item.active .cat-name,.cat-item:hover .cat-name{color:var(--gold-bright)}
.cat-meaning{font-size:9.5px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-bar{height:2px;background:rgba(255,255,255,0.05);border-radius:1px;margin-top:3px;display:flex;overflow:hidden}
.cat-bar-k{background:var(--green);border-radius:1px}
.cat-bar-l{background:var(--gold-dim);border-radius:1px}
.cat-count{font-size:9.5px;color:var(--text-muted);font-family:var(--ff-mono);background:rgba(255,255,255,0.05);border-radius:9px;padding:1px 5px;flex-shrink:0}
.cat-item.active .cat-count{background:rgba(226,168,71,0.14);color:var(--gold)}

/* ---- MAIN ---- */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(180deg,rgba(16,26,43,0.9) 0%,rgba(12,20,34,0.98) 100%)}
.sec-tabs{display:flex;gap:8px;padding:14px 24px 10px;border-bottom:1px solid rgba(226,168,71,0.12);background:linear-gradient(180deg,rgba(20,30,49,0.9),rgba(15,24,40,0.78));align-items:center;box-shadow:inset 0 -1px 0 rgba(255,255,255,0.02)}
.sec-tab{display:flex;align-items:center;gap:7px;padding:8px 16px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);color:var(--text-muted);font-family:var(--ff-ui);font-size:12px;cursor:pointer;border-radius:999px;transition:all var(--t-s);white-space:nowrap;backdrop-filter:blur(8px)}
.sec-tab:hover{border-color:rgba(226,168,71,0.28);color:var(--text-sec);transform:translateY(-1px)}
.sec-tab.active{background:linear-gradient(135deg,rgba(226,168,71,0.2),rgba(226,168,71,0.08));border-color:rgba(245,201,109,0.55);color:var(--gold-bright);box-shadow:0 8px 24px rgba(226,168,71,0.12)}
.tab-icon{font-size:13px;line-height:1}

.toolbar{padding:14px 24px 18px;display:flex;flex-direction:column;align-items:stretch;border-bottom:1px solid rgba(226,168,71,0.12);gap:12px;background:linear-gradient(180deg,rgba(18,28,46,0.85),rgba(12,20,34,0.52));position:relative}
.toolbar::after{content:'';position:absolute;left:24px;right:24px;bottom:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,201,109,0.26),transparent)}
.toolbar-main{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.breadcrumb{font-size:12.5px;color:var(--text-muted);flex:1;min-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:10px 14px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);border-radius:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.02)}
.bc-sep{margin:0 7px;opacity:.3}
.bc-section{color:var(--text-sec)}
.bc-cat{color:var(--gold-bright);font-weight:500}
.quick-actions{display:flex;gap:10px;flex-wrap:wrap}
.quick-btn{padding:9px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:var(--text-sec);font-family:var(--ff-ui);font-size:11.5px;cursor:pointer;transition:all var(--t-s);box-shadow:inset 0 1px 0 rgba(255,255,255,0.03)}
.quick-btn:hover{border-color:rgba(245,201,109,0.34);color:var(--gold-bright);background:rgba(226,168,71,0.1);transform:translateY(-1px)}
.quick-btn[disabled]{opacity:.45;cursor:not-allowed;transform:none}
.quick-count{color:var(--gold-bright);font-family:var(--ff-mono);margin-left:4px}
.mode-tabs{display:flex;gap:10px;background:transparent;border:none;padding:0;flex-shrink:0;backdrop-filter:none}
.mode-tab{padding:10px 18px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text-muted);font-family:var(--ff-ui);font-size:11.5px;cursor:pointer;border-radius:999px;transition:all var(--t-s);box-shadow:inset 0 1px 0 rgba(255,255,255,0.03)}
.mode-tab:hover{color:var(--text-primary)}
.mode-tab.active{background:linear-gradient(135deg,rgba(226,168,71,0.22),rgba(226,168,71,0.1));border-color:rgba(245,201,109,0.32);color:var(--gold-bright);box-shadow:0 8px 20px rgba(226,168,71,0.12),inset 0 1px 0 rgba(255,255,255,0.05)}

/* Global search */
.global-search{position:relative;flex:1;max-width:320px;margin-right:0}
.global-sinp{width:100%;background:rgba(255,255,255,0.045);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:10px 12px;color:var(--text-primary);font-family:var(--ff-ui);font-size:12px;outline:none;transition:all var(--t-s);box-shadow:inset 0 1px 0 rgba(255,255,255,0.02)}
.global-sinp:focus{border-color:rgba(245,201,109,0.38);background:rgba(226,168,71,0.05);box-shadow:0 0 0 3px rgba(226,168,71,0.08)}
.global-sinp::placeholder{color:var(--text-muted)}
.global-results{position:absolute;top:100%;left:0;right:0;max-height:320px;overflow-y:auto;background:var(--bg-card);border:1px solid var(--gold-border);border-radius:var(--r-sm);margin-top:4px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.global-results::-webkit-scrollbar{width:3px}
.global-results::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.gres-item{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;cursor:pointer;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04);transition:all var(--t-s)}
.gres-item:hover{background:rgba(226,168,71,0.08)}
.gres-item .gr-word{font-family:var(--ff-display);color:var(--gold-bright);font-weight:600;font-size:13px;min-width:80px}
.gres-item .gr-meaning{color:var(--text-sec);flex:1;margin:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.gres-item .gr-loc{color:var(--text-muted);font-size:9px;white-space:nowrap}
.gres-empty{padding:12px;text-align:center;color:var(--text-muted);font-size:11px}

/* ---- STUDY AREA ---- */
.study-content{flex:1;position:relative;overflow:hidden;transition:opacity .2s ease,transform .2s ease}
.study-content.fading{opacity:0;transform:translateY(6px)}

/* ---- FLASHCARD ---- */
.fc-area{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px 24px;gap:24px;perspective:1400px}
.filter-tabs{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;padding:6px 8px;border-radius:999px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);backdrop-filter:blur(10px)}
.filter-tab{padding:6px 14px;border-radius:999px;border:1px solid transparent;background:transparent;color:var(--text-muted);font-size:11px;cursor:pointer;font-family:var(--ff-ui);transition:all var(--t-s)}
.filter-tab:hover{border-color:rgba(226,168,71,0.22);color:var(--text-sec);background:rgba(255,255,255,0.025)}
.filter-tab.active{background:linear-gradient(135deg,rgba(226,168,71,0.18),rgba(226,168,71,0.08));border-color:rgba(245,201,109,0.4);color:var(--gold-bright)}

.card-wrap{width:min(560px,100%);max-width:100%}
.card-container{width:100%;height:360px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .15s ease-out;will-change:transform}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform var(--t-flip)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:38px 40px;transition:box-shadow var(--t-s),transform var(--t-s);overflow:hidden}
.card-front{background:linear-gradient(155deg,rgba(28,40,64,0.98),rgba(18,28,46,0.94) 52%,rgba(17,24,39,0.98));border:1px solid rgba(245,201,109,0.22);box-shadow:0 18px 40px rgba(0,0,0,0.42),inset 0 1px 0 rgba(255,255,255,0.03),0 0 0 1px rgba(226,168,71,0.12)}
.card-back{background:linear-gradient(160deg,rgba(30,42,68,0.98),rgba(19,30,48,0.96) 52%,rgba(17,24,39,0.98));border:1px solid rgba(245,201,109,0.2);box-shadow:0 18px 40px rgba(0,0,0,0.42),inset 0 1px 0 rgba(255,255,255,0.03);transform:rotateY(180deg)}
.card-container:hover .card-face{box-shadow:0 24px 60px rgba(0,0,0,0.55),0 0 0 1px rgba(245,201,109,0.28),0 0 70px rgba(226,168,71,0.12)}
.card-front::before{content:'';position:absolute;top:-18px;left:-12px;width:180px;height:180px;background:radial-gradient(circle at 35% 35%,rgba(245,201,109,0.18),transparent 68%);pointer-events:none}
.card-back::before{content:'';position:absolute;right:-24px;bottom:-28px;width:190px;height:190px;background:radial-gradient(circle at 50% 50%,rgba(93,138,198,0.12),transparent 68%);pointer-events:none}
.card-status-dot{position:absolute;top:16px;right:16px;width:8px;height:8px;border-radius:50%}
.card-status-dot.known{background:var(--green);box-shadow:0 0 6px rgba(107,196,138,0.5)}
.card-status-dot.learning{background:var(--gold);box-shadow:0 0 6px rgba(226,168,71,0.5)}
.card-status-dot.new{border:1px solid rgba(255,255,255,0.15)}
.card-word{font-family:var(--ff-display);font-size:clamp(42px,6vw,64px);font-weight:700;color:var(--gold-bright);letter-spacing:.03em;line-height:1.02;text-align:center;text-shadow:0 10px 26px rgba(226,168,71,0.16);max-width:100%}
.card-ph-row{display:flex;align-items:center;gap:9px;margin-top:12px;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.06)}
.card-phonetic{font-family:var(--ff-mono);font-size:14px;color:var(--text-muted);letter-spacing:.04em;min-height:20px}
.speak-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:6px;border-radius:999px;transition:all var(--t-s);display:flex;align-items:center}
.speak-btn:hover{color:var(--gold);background:rgba(226,168,71,0.12);transform:translateY(-1px)}
.speak-btn.speaking{color:var(--gold);animation:pulse .6s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.55}to{opacity:1}}
.card-hint{font-size:11.5px;color:var(--text-muted);margin-top:20px;letter-spacing:.08em;opacity:.55;text-transform:uppercase}
.card-meaning{font-family:var(--ff-display);font-size:28px;color:var(--text-primary);text-align:center;line-height:1.6;max-width:100%}
.card-root-ref{font-size:12.5px;color:#d8b772;margin-top:15px;font-family:var(--ff-mono);text-align:center;background:rgba(226,168,71,0.08);border:1px solid rgba(226,168,71,0.18);padding:7px 14px;border-radius:999px;max-width:100%}
.card-example{font-size:14px;color:#c9c1b2;margin-top:0;text-align:center;font-style:italic;line-height:1.68;max-width:88%}
.card-ex-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:18px;position:relative;z-index:2}
.ex-speak-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);cursor:pointer;color:var(--text-muted);font-size:16px;line-height:1;min-width:44px;min-height:44px;padding:0 10px;border-radius:999px;transition:all var(--t-s);flex-shrink:0;opacity:.92;display:flex;align-items:center;justify-content:center;position:relative;z-index:3;box-shadow:inset 0 1px 0 rgba(255,255,255,0.03)}
.ex-speak-btn:hover{color:var(--gold);opacity:1;background:rgba(226,168,71,0.12);border-color:var(--gold-border2);transform:translateY(-1px)}
.ex-speak-btn:active{transform:scale(.96)}
.card-ex-cn{font-size:12px;color:var(--gold-dim);margin-top:8px;text-align:center;line-height:1.55}

.card-nav{display:flex;align-items:center;gap:18px}
.nav-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--gold-border);background:var(--bg-surface);color:var(--text-sec);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--t-b)}
.nav-btn:hover{border-color:var(--gold);color:var(--gold-bright);background:rgba(226,168,71,0.1);transform:scale(1.08)}
.nav-btn:active{transform:scale(0.92)}
.nav-btn.pressed{animation:btnPress .18s ease}
@keyframes btnPress{0%{transform:scale(1)}50%{transform:scale(.88);background:rgba(226,168,71,0.18)}100%{transform:scale(1)}}
.card-counter{font-family:var(--ff-mono);font-size:12.5px;color:var(--text-muted);min-width:65px;text-align:center}

.action-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.action-btn{padding:11px 20px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:var(--text-sec);cursor:pointer;font-size:12.5px;font-family:var(--ff-ui);transition:all var(--t-s);display:flex;align-items:center;gap:7px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.03)}
.action-btn.know{border-color:rgba(107,196,138,0.3);color:var(--green)}
.action-btn.know:hover{background:var(--green-bg);border-color:var(--green);transform:translateY(-2px);box-shadow:0 5px 14px rgba(107,196,138,0.14)}
.action-btn.dunno{border-color:rgba(224,112,112,0.3);color:var(--red)}
.action-btn.dunno:hover{background:var(--red-bg);border-color:var(--red);transform:translateY(-2px);box-shadow:0 5px 14px rgba(224,112,112,0.14)}

.kbd-hints{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05)}
.kbd-hint{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:3px}
kbd{display:inline-block;padding:1px 5px;border-radius:4px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.05);font-family:var(--ff-mono);font-size:9.5px;color:var(--text-sec);transition:all .12s ease}
kbd.active-key{border-color:var(--gold);background:rgba(226,168,71,0.15);color:var(--gold-bright);box-shadow:0 0 7px rgba(226,168,71,0.2)}

/* ---- GRID ---- */
.grid-area{position:absolute;inset:0;display:none;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px;padding:14px 22px;overflow-y:auto;align-content:start}
.grid-area.visible{display:grid;animation:gReveal .3s ease both}
@keyframes gReveal{from{opacity:0}to{opacity:1}}
.grid-area::-webkit-scrollbar{width:3px}
.grid-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.grid-search-bar{grid-column:1/-1;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.gsw{position:relative;flex:1;min-width:160px}
.gsw::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:15px;pointer-events:none;z-index:1}
.grid-sinp{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r-sm);padding:7px 12px 7px 32px;color:var(--text-primary);font-family:var(--ff-ui);font-size:12.5px;outline:none;transition:all var(--t-s)}
.grid-sinp:focus{border-color:var(--gold-border2);background:rgba(226,168,71,0.04)}
.gfbtn{padding:6px 12px;border-radius:var(--r-sm);border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--text-muted);font-size:11px;cursor:pointer;font-family:var(--ff-ui);transition:all var(--t-s)}
.gfbtn:hover{border-color:var(--gold-border);color:var(--text-sec)}
.gfbtn.active{background:rgba(226,168,71,0.12);border-color:var(--gold);color:var(--gold-bright)}
.grid-card{background:var(--bg-card);border:1px solid var(--gold-border);border-radius:var(--r-md);padding:16px;cursor:pointer;transition:all var(--t-s);position:relative;animation:cFadeIn .3s ease both}
@keyframes cFadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.grid-card:hover{border-color:var(--gold-border2);background:var(--bg-card-hov);transform:translateY(-3px);box-shadow:0 9px 26px rgba(0,0,0,0.35),0 0 0 1px var(--gold-border2)}
.gword{font-family:var(--ff-display);font-size:20px;font-weight:600;color:var(--gold-bright)}
.gph{font-family:var(--ff-mono);font-size:10.5px;color:var(--text-muted);margin-top:2px;min-height:15px}
.gmeaning{font-size:12.5px;color:var(--text-sec);margin-top:7px;line-height:1.5}
.gbd{font-size:10px;color:var(--gold-dim);margin-top:5px;font-family:var(--ff-mono)}
.g-dot{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%}
.g-dot.known{background:var(--green);box-shadow:0 0 5px rgba(107,196,138,0.4)}
.g-dot.learning{background:var(--gold);box-shadow:0 0 5px rgba(226,168,71,0.4)}
.g-dot.new{border:1px solid rgba(255,255,255,0.12)}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--bg-card);border:1px solid var(--gold-border2);padding:10px 20px;border-radius:22px;font-size:12.5px;color:var(--gold-bright);opacity:0;transition:all .4s cubic-bezier(0.34,1.56,0.64,1);z-index:200;pointer-events:none;backdrop-filter:blur(8px);box-shadow:0 6px 20px rgba(0,0,0,0.4);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ---- MOBILE ---- */
.mobile-btn{display:none;position:fixed;bottom:18px;right:18px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--bg-deep);border:none;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 10px 30px rgba(226,168,71,0.35),0 0 0 1px rgba(255,255,255,0.08) inset;transition:all var(--t-s)}
.mobile-btn:hover{transform:scale(1.08)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:150;backdrop-filter:blur(2px)}
.sb-overlay.open{display:block}

@media(max-width:700px){.sidebar{width:260px;min-width:260px}.toolbar{padding:12px 16px 16px}.toolbar::after{left:16px;right:16px}.global-search{max-width:none;width:100%}.card-container{height:300px}.card-word{font-size:42px}.card-meaning{font-size:22px}.card-phonetic{font-size:13px}.filter-tabs{max-width:100%}}
@media(max-width:560px){.sidebar{position:fixed;left:-300px;top:0;z-index:160;transition:left .3s ease;width:278px;min-width:278px;height:100vh}.sidebar.open{left:0}.mobile-btn{display:flex;align-items:center;justify-content:center}.card-container{height:250px}.card-word{font-size:34px}.card-meaning{font-size:19px}.card-face{padding:24px 20px;border-radius:26px}.card-ph-row{margin-top:10px;padding:6px 10px}.card-root-ref{font-size:11px;padding:6px 10px}.card-example{max-width:100%;font-size:13px}.filter-tabs{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;width:100%;padding:6px}.action-row{width:100%;gap:10px}.action-btn{flex:1;justify-content:center;padding:10px 14px}.kbd-hints{border-radius:18px;padding:10px}.sec-tab .tab-lbl{display:none}.sec-tab{padding:7px 10px}.toolbar{padding:10px 14px}.toolbar::after{left:14px;right:14px}.toolbar-main{flex-wrap:wrap}.global-search{max-width:none;width:100%;margin-right:0;order:3}.quick-actions{gap:8px}.quick-btn{flex:1;min-width:132px;text-align:center;padding:10px 12px}.spell-input-row{flex-direction:column}.spell-inp{max-width:none}.spell-btn{width:100%}}
/* Spelling */
.spelling-area{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:20px}
.spell-card{text-align:center;max-width:460px;width:100%;padding:28px 24px;border-radius:30px;background:linear-gradient(160deg,rgba(27,39,62,0.98),rgba(17,25,41,0.98));border:1px solid rgba(245,201,109,0.18);box-shadow:0 18px 44px rgba(0,0,0,0.42),inset 0 1px 0 rgba(255,255,255,0.03)}
.spell-speaker{cursor:pointer;font-size:28px;padding:10px;color:var(--gold);transition:all var(--t-s);user-select:none}
.spell-speaker:hover{transform:scale(1.1);color:var(--gold-bright)}
.spell-speaker span{font-size:12px;color:var(--text-muted);display:block;margin-top:4px}
.spell-meaning{font-family:var(--ff-display);font-size:26px;color:var(--text-primary);margin:16px 0 8px;line-height:1.5}
.spell-hint{font-size:11px;color:var(--text-muted);margin-bottom:20px;min-height:18px}
.spell-input-row{display:flex;gap:8px;justify-content:center}
.spell-inp{flex:1;max-width:280px;background:rgba(255,255,255,0.04);border:1px solid var(--gold-border);border-radius:var(--r-sm);padding:10px 14px;color:var(--text-primary);font-family:var(--ff-ui);font-size:18px;outline:none;text-align:center;transition:all var(--t-s)}
.spell-inp:focus{border-color:var(--gold);background:rgba(226,168,71,0.04);box-shadow:0 0 12px var(--gold-glow)}
.spell-btn{background:var(--gold-dim);border:none;color:var(--bg-deep);padding:10px 22px;border-radius:var(--r-sm);cursor:pointer;font-family:var(--ff-ui);font-size:14px;font-weight:500;transition:all var(--t-s)}
.spell-btn:hover{background:var(--gold);transform:translateY(-1px)}
.spell-result{font-size:18px;margin-top:16px;min-height:28px;font-weight:600}
.spell-result.correct{color:var(--green)}
.spell-result.wrong{color:var(--red)}
.spell-stats{font-size:12px;color:var(--text-muted);margin-top:12px}
.spell-filter-row{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
</style>
</head>

        <button class="filter-tab" data-filter="review" onclick="setFilter('review')">🔁待复习</button>

<script>
const sections = {
  roots_affixes: {
    id: 'roots_affixes',
    label: '词根词缀法',
    description: '通过词根词缀系统记忆',
    icon: '◆',
    categories: [


  {
    type: 'prefix',
    root: 'pre-',
    meaning: '前, 预先',
    words: [
      { word: 'preview', phonetic: '/ˈpriːvjuː/', meaning: 'n./v. 预览；预习', breakdown: 'pre- (前) + view (看)', example: 'Preview the chapter before class.', status: 'new' },
      { word: 'predict', phonetic: '/prɪˈdɪkt/', meaning: 'v. 预测；预言', breakdown: 'pre- (前) + dict (说)', example: 'Experts predict economic growth.', status: 'new' },
      { word: 'preface', phonetic: '/ˈprefəs/', meaning: 'n. 前言；序言', breakdown: 'pre- (前) + face (说)', example: 'Read the preface of the book.', status: 'new' },
      { word: 'precaution', phonetic: '/prɪˈkɔːʃən/', meaning: 'n. 预防；警惕', breakdown: 'pre- (前) + caution (小心)', example: 'Take precautions against fire.', status: 'new' },
      { word: 'preceding', phonetic: '/prɪˈsiːdɪŋ/', meaning: 'adj. 在前的；前面的', breakdown: 'pre- (前) + ced (走) + -ing', example: 'See the preceding chapter.', status: 'new' },
      { word: 'prejudice', phonetic: '/ˈpredʒʊdɪs/', meaning: 'n. 偏见；成见', breakdown: 'pre- (前) + judice (判断)', example: 'overcome racial prejudice', status: 'new' },
      { word: 'prescribe', phonetic: '/prɪˈskraɪb/', meaning: 'v. 开药方；规定', breakdown: 'pre- (前) + scribe (写)', example: 'The doctor prescribed medicine.', status: 'new' },
      { word: 'preliminary', phonetic: '/prɪˈlɪmɪnəri/', meaning: 'adj. 初步的；预备的', breakdown: 'pre- (前) + limin (门槛)', example: 'preliminary results', status: 'new' },
    ]
  },
  {
    type: 'prefix',
    root: 're-',
    meaning: '再, 重新, 回',
    words: [
      { word: 'review', phonetic: '/rɪˈvjuː/', meaning: 'v./n. 复习；回顾', breakdown: 're- (再) + view (看)', example: 'Review your notes daily.', status: 'new' },
      { word: 'return', phonetic: '/rɪˈtɜːn/', meaning: 'v./n. 返回；归还', breakdown: 're- (回) + turn (转)', example: 'return the book to the library', status: 'new' },
      { word: 'rebuild', phonetic: '/riːˈbɪld/', meaning: 'v. 重建；改造', breakdown: 're- (再) + build (建造)', example: 'rebuild after the earthquake', status: 'new' },
      { word: 'recall', phonetic: '/rɪˈkɔːl/', meaning: 'v./n. 回忆；召回', breakdown: 're- (回) + call (叫)', example: 'I can\'t recall his name.', status: 'new' },
      { word: 'refresh', phonetic: '/rɪˈfreʃ/', meaning: 'v. 恢复精神；刷新', breakdown: 're- (再) + fresh (新鲜)', example: 'refresh the page', status: 'new' },
      { word: 'reform', phonetic: '/rɪˈfɔːm/', meaning: 'v./n. 改革；改良', breakdown: 're- (再) + form (形状)', example: 'educational reform', status: 'new' },
      { word: 'retire', phonetic: '/rɪˈtaɪə/', meaning: 'v. 退休；退出', breakdown: 're- (回) + tire (拉)', example: 'He retired last year.', status: 'new' },
      { word: 'reveal', phonetic: '/rɪˈviːl/', meaning: 'v. 揭示；展现', breakdown: 're- (移开) + veal (面纱)', example: 'reveal the truth', status: 'new' },
    ]
  },
  {
    type: 'prefix',
    root: 'dis- / un- / in-',

function currentCategory() { return sections[currentSection].categories[currentCategoryIndex]; }

// ============ STORAGE ============
function loadStatuses() {
  const v2 = localStorage.getItem('vocab_statuses_v2');
  if (v2) { wordStatuses = JSON.parse(v2); return; }
  const v1 = JSON.parse(localStorage.getItem('vocab_statuses') || '{}');
  wordStatuses = Object.keys(v1).length > 0
    ? { roots_affixes: v1, high_frequency: {}, essential: {} }
    : { roots_affixes: {}, high_frequency: {}, essential: {} };
  saveStatuses();
}
// SM-2 复习间隔（天）
function getReviewInterval(reviewCount){return[1,2,4,7,15,30][Math.min(reviewCount,5)];}
function todayStr(){return new Date().toISOString().slice(0,10);}
function daysFromNow(n){var d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}

function saveStatuses() {
  for (const sid of Object.keys(sections)) {
    if (!wordStatuses[sid]) wordStatuses[sid] = {};
    for (const cat of sections[sid].categories)
      for (const w of cat.words){
        if(typeof wordStatuses[sid][w.word]==='string') wordStatuses[sid][w.word]={status:w.status,reviewCount:0,nextReview:'',lastReview:''};
        wordStatuses[sid][w.word].status=w.status;
      }
  }
  localStorage.setItem('vocab_statuses_v2', JSON.stringify(wordStatuses));
  localStorage.setItem('spelling_errors', JSON.stringify(spellingErrors));
}
function initStatuses() {
  for (const sid of Object.keys(sections)) {
    if (!wordStatuses[sid]) wordStatuses[sid] = {};
    for (const cat of sections[sid].categories)
      for (const w of cat.words) {
        var entry=wordStatuses[sid][w.word];
        // Migrate old string format → object format
        if(!entry||typeof entry==='string'){
          entry={status:entry||w.status||'new',reviewCount:0,nextReview:'',lastReview:''};
          wordStatuses[sid][w.word]=entry;
        }
        w.status=entry.status;
        w._reviewCount=entry.reviewCount||0;
        w._nextReview=entry.nextReview||'';
        w._lastReview=entry.lastReview||'';
      }
  }
  // Load spelling errors
  try{spellingErrors=JSON.parse(localStorage.getItem('spelling_errors')||'{}');}catch(e){spellingErrors={};}
}
// Review helpers
function updateReview(word,known){
  var sid=currentSection; if(!wordStatuses[sid]) wordStatuses[sid]={};
  var entry=wordStatuses[sid][word.word];
  if(!entry||typeof entry==='string') entry={status:word.status,reviewCount:0,nextReview:'',lastReview:''};
  if(known){
    entry.reviewCount=(entry.reviewCount||0)+1;
    entry.nextReview=daysFromNow(getReviewInterval(entry.reviewCount-1));
    entry.lastReview=todayStr();
  }else{
    entry.reviewCount=0;
    entry.nextReview=daysFromNow(1);
    entry.lastReview='';
  }
  wordStatuses[sid][word.word]=entry;
  word._reviewCount=entry.reviewCount;
  word._nextReview=entry.nextReview;
  word._lastReview=entry.lastReview;
}
function getDueCount(sid){
  var today=todayStr(),count=0;
  var cats=sections[sid].categories;
  for(var i=0;i<cats.length;i++)
    for(var j=0;j<cats[i].words.length;j++){
      var w=cats[i].words[j];
      if(w._nextReview&&w._nextReview<=today&&w.status==='known') count++;
    }
  return count;
}
function getTotalDueCount(){
  var total=0;
  for(var sid in sections) total+=getDueCount(sid);
  return total;
}

// ============ STATS ============
function getCatStats(cat) {
  let known=0,learning=0;
  for(const w of cat.words){if(w.status==='known')known++;else if(w.status==='learning')learning++;}
  return {known,learning,total:cat.words.length};
}
function getSectionStats(sid) {
  let known=0,learning=0,total=0;
  for(const cat of sections[sid].categories){const s=getCatStats(cat);known+=s.known;learning+=s.learning;total+=s.total;}
  return {known,learning,total};
}
function updateStats() {
  const s=getSectionStats(currentSection);
  const pct=s.total>0?Math.round(s.known/s.total*100):0;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressRing').style.strokeDashoffset=263.9*(1-pct/100);
  document.getElementById('statKnown').textContent=s.known;
  document.getElementById('statLearning').textContent=s.learning;
  document.getElementById('statTotal').textContent=s.total;
  var due=getDueCount(currentSection);
  var dueEl=document.getElementById('statDue');
  if(dueEl){dueEl.textContent=due;dueEl.parentElement.style.display='';}
  // Update review filter button with count
  var reviewBtns=document.querySelectorAll('[data-filter=\"review\"]');
  for(var i=0;i<reviewBtns.length;i++) reviewBtns[i].textContent='🔁待复习'+(due>0?' ('+due+')':'');
  if(pct===100&&s.total>0) triggerConfetti();
}

// ============ SIDEBAR ============
const GRP_LABELS = { prefix:'前缀', root:'词根', suffix:'后缀', frequency:'频次分组', essential:'字母分区' };
const grpCollapsed = {};

function renderSidebar() {
  const nav = document.getElementById('categoryNav');
  const sv = document.getElementById('sidebarSearch').value.toLowerCase().trim();
  const cats = sections[currentSection].categories;
  let html='', curType='';
  for(let i=0;i<cats.length;i++){
    const cat=cats[i];
    if(sv && !cat.root.toLowerCase().includes(sv) && !cat.meaning.toLowerCase().includes(sv)) continue;
    if(cat.type!==curType){
      if(curType) html+='</div></div>';
      curType=cat.type;
      const gid='g_'+currentSection+'_'+curType;
      const col=grpCollapsed[gid]?'collapsed':'';
      html+=`<div class="cat-group ${col}" id="${gid}">`;
      html+=`<div class="cat-grp-hdr" onclick="toggleGrp('${gid}')"><span>${GRP_LABELS[curType]||curType}</span><span class="cat-grp-chevron">▾</span></div>`;
      html+=`<div class="cat-grp-items">`;
    }
    const st=getCatStats(cat);
    const active=i===currentCategoryIndex;
    const icon=(cat.root||'?').replace(/[-\/]/g,'').substring(0,4);
    const kp=st.total>0?st.known/st.total*100:0;
    const lp=st.total>0?st.learning/st.total*100:0;
    html+=`<div class="cat-item ${active?'active':''}" onclick="selectCategory(${i})">
      <div class="cat-icon">${icon}</div>
      <div class="cat-info">
        <div class="cat-name">${cat.root}</div>
        <div class="cat-meaning">${cat.meaning}</div>
        <div class="cat-bar"><div class="cat-bar-k" style="width:${kp}%"></div><div class="cat-bar-l" style="width:${lp}%"></div></div>
      </div>
      <div class="cat-count">${st.total}</div>
    </div>`;
  }
  if(curType) html+='</div></div>';
  nav.innerHTML=html;
  // scroll active into view
  const el=nav.querySelector('.cat-item.active');
  if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

}

function switchSection(sectionId) {
  if(currentSection===sectionId) return;
  currentSection=sectionId;
  currentCategoryIndex=0;
  currentWordIndex=0;
  document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));

}

// ============ FILTER ============
function setFilter(f) {
  cardFilter=f;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
  buildFilteredWords();
  renderCard();
}
function buildFilteredWords() {
  const cat=currentCategory();
  const prevWord=filteredWords.length>0 ? filteredWords[filteredIdx] : null;
  const prevWordText=prevWord ? prevWord.word : '';
  if(cardFilter==='all') filteredWords=[...cat.words];
  else if(cardFilter==='review'){var t=todayStr();filteredWords=cat.words.filter(w=>w._nextReview&&w._nextReview<=t&&w.status==='known');}
  else filteredWords=cat.words.filter(w=>w.status===cardFilter);
  // Keep position on current word by matching word text
  if(prevWordText){
    const found=filteredWords.findIndex(w=>w.word===prevWordText);
    filteredIdx=found>=0 ? found : 0;
  }else{
    filteredIdx=0;
  }
  currentWordIndex = filteredWords.length>0 ? cat.words.indexOf(filteredWords[filteredIdx]) : 0;
}

// ============ CARD RENDERING ============
function renderCard() {
  if(filteredWords.length===0){
    document.getElementById('cardWord').textContent='无单词';
    document.getElementById('cardPhonetic').textContent='';
    document.getElementById('cardMeaning').textContent='本分类下无符合条件的单词';
    document.getElementById('cardRootRef').style.display='none';
    document.getElementById('cardExample').innerHTML='';
    document.getElementById('cardCounter').textContent='0 / 0';
    document.getElementById('dotFront').className='card-status-dot new';
    document.getElementById('dotBack').className='card-status-dot new';
    document.getElementById('cardInner').classList.remove('flipped');
    return;
  }
  const word=filteredWords[filteredIdx];
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('cardWord').textContent=word.word;
  document.getElementById('cardPhonetic').textContent=word.phonetic||'';
  document.getElementById('cardMeaning').textContent=word.meaning||'释义待补充';
  const ref=document.getElementById('cardRootRef');
  if(word.breakdown){ref.textContent=word.breakdown;ref.style.display='';}else{ref.style.display='none';}
  document.getElementById('cardExample').innerHTML=(word.example||'')+'<div class="card-ex-cn">'+translateExample(word.example,word.meaning,word.exampleCn||'')+'</div>';
  document.getElementById('cardCounter').textContent=(filteredIdx+1)+' / '+filteredWords.length;
  const sc=word.status==='known'?'known':word.status==='learning'?'learning':'new';
  document.getElementById('dotFront').className='card-status-dot '+sc;
  document.getElementById('dotBack').className='card-status-dot '+sc;
}
function flipCard() { document.getElementById('cardInner').classList.toggle('flipped'); }
// Card parallax tilt
(function(){
  var card=document.getElementById('cardContainer');
  if(!card) return;
  card.addEventListener('mousemove',function(e){
    var rect=card.getBoundingClientRect();
    var x=(e.clientX-rect.left)/rect.width-.5;
    var y=(e.clientY-rect.top)/rect.height-.5;
    card.style.transform='perspective(1200px) rotateY('+(x*8)+'deg) rotateX('+(-y*5)+'deg)';
  });
  card.addEventListener('mouseleave',function(){card.style.transform='perspective(1200px) rotateY(0) rotateX(0)';});
})();
function prevCard(e){e&&e.stopPropagation();if(filteredWords.length===0)return;flashBtn('prevBtn');filteredIdx=(filteredIdx-1+filteredWords.length)%filteredWords.length;renderCard();}
function nextCard(e){e&&e.stopPropagation();if(filteredWords.length===0)return;flashBtn('nextBtn');filteredIdx=(filteredIdx+1)%filteredWords.length;renderCard();}
function flashBtn(id){const b=document.getElementById(id);if(!b)return;b.classList.add('pressed');setTimeout(()=>b.classList.remove('pressed'),200);}

// ============ MARK WORD ============
function markWord(status,e) {
  e&&e.stopPropagation();
  if(filteredWords.length===0) return;
  const word=filteredWords[filteredIdx];
  word.status=status;
  if(!wordStatuses[currentSection]) wordStatuses[currentSection]={};
  updateReview(word,status==='known');
  saveStatuses();updateStats();renderSidebar();
  buildFilteredWords();renderCard();
  showToast(status==='known'?`✓ "${word.word}" 已掌握,${word._nextReview?'下次复习:'+word._nextReview:''}`:`↻ "${word.word}" 复习重置`);
}

function renderGrid(){
  const cat=currentCategory();
  const grid=document.getElementById('gridArea');
  const sv=(document.getElementById('gridSearch')?.value||'').toLowerCase().trim();
  const bar=grid.querySelector('.grid-search-bar');
  const barHTML=bar?bar.outerHTML:'';
  let html='';let d=0;
  for(let i=0;i<cat.words.length;i++){
    const w=cat.words[i];
    if(gridFilter!=='all'&&w.status!==gridFilter) continue;
    if(sv&&!w.word.toLowerCase().includes(sv)&&!w.meaning.toLowerCase().includes(sv)) continue;
    const sc=w.status==='known'?'known':w.status==='learning'?'learning':'new';
    const ad=Math.min(d*0.035,0.45);
    html+=`<div class="grid-card" style="animation-delay:${ad}s" onclick="jumpToCard(${i})">
      <div class="g-dot ${sc}"></div>
      <div class="gword">${w.word}</div>
      ${w.phonetic?`<div class="gph">${w.phonetic}</div>`:''}
      ${w.meaning?`<div class="gmeaning">${w.meaning}</div>`:''}
      ${w.breakdown?`<div class="gbd">${w.breakdown}</div>`:''}
    </div>`;
    d++;
  }
  grid.innerHTML=barHTML+html;
  const gi=document.getElementById('gridSearch');
  if(gi) gi.oninput=renderGrid;
}
function jumpToCard(wordIdx) {
  const cat=currentCategory();
  filteredWords=[cat.words[wordIdx]];filteredIdx=0;
  switchMode('flashcard');renderCard();
}

// ============ TTS ============
function speakWord(e){
  e&&e.stopPropagation();
  if(filteredWords.length===0) return;
  var w=filteredWords[filteredIdx];
  if(!w||!w.word) return;
  var btn=document.getElementById('speakBtn');
  btn.classList.add('speaking');
  var done=function(){btn.classList.remove('speaking');};
  function fallback(){
    if('speechSynthesis' in window){
      var u=new SpeechSynthesisUtterance(w.word);
      u.lang='en-US';u.rate=0.85;
      u.onend=done;u.onerror=done;
      window.speechSynthesis.speak(u);
    }else{done();}
  }
  var audio=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(w.word)+'&type=0');
  audio.onended=done;
  audio.onerror=fallback;
  audio.play().catch(fallback);
}

function translateExample(ex, meaning, exCn){
  if(exCn) return exCn;
  if(!ex) return '';
  if(ex.indexOf(' is important')>0||ex.indexOf(' are important')>0) return ex.replace(/ (is|are) important/,'')+' 很重要。';
  if(ex.indexOf('We talked about ')>-1) return '我们讨论了 '+ex.replace('We talked about ','').replace('.','')+'。';
  if(ex.indexOf('We need to ')>-1) return '我们需要'+ex.replace('We need to ','').replace('.','')+'。';
  if(ex.indexOf('They ')>-1&&ex.indexOf(' it every day')>-1) return '他们每天都'+ex.split(' ')[1]+'。';
  if(ex.indexOf('This is very ')>-1) return '这非常'+ex.replace('This is very ','').replace('.','')+'。';
  if(ex.indexOf(' is important')>-1) return ex.replace(' is important.','')+'很重要。';
  if(ex.indexOf(' of this is clear')>-1) return '涉及'+ex.split(' ')[0]+'的用法。';
  if(ex.indexOf('We often use')>-1) return '我们常用'+ex.replace(/We often use "?/,'').replace(/"?\./,'')+'这个词。';
  if(meaning){return '例: '+meaning.split(' ').slice(0,2).join(' ');}
  return '';
}

function speakExample(e){
  e&&e.stopPropagation();
  if(filteredWords.length===0) return;
  var w=filteredWords[filteredIdx];
  var text=w&&w.example?w.example:'';
  if(!text) return;
  function fallback(){
    if('speechSynthesis' in window){
      var u=new SpeechSynthesisUtterance(text);
      u.lang='en-US';u.rate=0.8;
      window.speechSynthesis.speak(u);
    }
  }
  var audio=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=0');
  audio.onerror=fallback;
  audio.play().catch(fallback);
}

// ============ TOAST ============
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// ============ CONFETTI ============
function triggerConfetti(){
  let wrap=document.getElementById('confetti');
  if(!wrap){wrap=document.createElement('div');wrap.id='confetti';wrap.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden';document.body.appendChild(wrap);}
  wrap.innerHTML='';
  const colors=['#f5c96d','#6bc48a','#70a8e0','#e07070','#e2a847','#ffffff'];
  for(let i=0;i<70;i++){
    const p=document.createElement('div');
    const c=colors[Math.floor(Math.random()*colors.length)];
    const sz=4+Math.random()*7;
    p.style.cssText=`position:absolute;width:${sz}px;height:${sz*(Math.random()>.5?.5:1)}px;background:${c};left:${Math.random()*100}%;top:-10px;border-radius:${Math.random()>.5?'50%':'2px'};animation:cf ${2+Math.random()*2}s ${Math.random()}s ease-in forwards;`;
    wrap.appendChild(p);
  }
  if(!document.getElementById('cfStyle')){
    const s=document.createElement('style');s.id='cfStyle';
    s.textContent='@keyframes cf{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}';
    document.head.appendChild(s);
  }
  setTimeout(()=>{wrap.innerHTML=''},4500);
  showToast('🎉 恭喜！本板块全部掌握！');
}

document.getElementById('sidebarSearch').addEventListener('input',renderSidebar);

// ============ MOBILE ============
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbOverlay').classList.toggle('open');}

function exportProgress(){
  var data={};
  data.vocab_statuses_v2=JSON.parse(localStorage.getItem('vocab_statuses_v2')||'{}');
  data.spelling_errors=JSON.parse(localStorage.getItem('spelling_errors')||'{}');
  var blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='vocab-progress-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToast('学习记录已导出');
}

function importProgress(e){
  var file=e.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(data.vocab_statuses_v2) localStorage.setItem('vocab_statuses_v2',JSON.stringify(data.vocab_statuses_v2));
      if(data.spelling_errors) localStorage.setItem('spelling_errors',JSON.stringify(data.spelling_errors));
      showToast('学习记录已导入,刷新生效');
      setTimeout(function(){location.reload();},1500);
    }catch(ex){showToast('导入失败:文件格式错误');}
  };
  reader.readAsText(file);
}

// ============ SPELLING ============
function speakSpellWord(e){
  e&&e.stopPropagation();
  if(spellWords.length===0) return;
  var w=spellWords[spellIndex];
  if(!w) return;
  function fallback(){
    if('speechSynthesis' in window){
      var u=new SpeechSynthesisUtterance(w.word);
      u.lang='en-US';u.rate=0.8;
      window.speechSynthesis.speak(u);
    }
  }
  var audio=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(w.word)+'&type=0');
  audio.onerror=fallback;
  audio.play().catch(fallback);
}

function setSpellFilter(f){
  spellFilter=f;
  var btns=document.querySelectorAll('#spellFilterRow .gfbtn');
  for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active',btns[i].dataset.sf===f);
  renderSpelling();
}

function renderSpelling(){
  const cat=currentCategory();
  spellWords=spellFilter==='all'?[...cat.words]:cat.words.filter(w=>w.status===spellFilter);
  if(spellWords.length===0){document.getElementById('spellMeaning').textContent='无单词';return;}
  // Shuffle
  for(let i=spellWords.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[spellWords[i],spellWords[j]]=[spellWords[j],spellWords[i]];}
  spellIndex=0;spellCorrect=0;spellTotal=0;
  showSpellWord();
}

function showSpellWord(){
  if(spellIndex>=spellWords.length){
    document.getElementById('spellMeaning').textContent='🎉 全部完成!';
    document.getElementById('spellResult').textContent=`正确 ${spellCorrect} / ${spellTotal}`;
    document.getElementById('spellResult').className='spell-result '+(spellCorrect===spellTotal?'correct':'wrong');
    document.getElementById('spellStats').textContent='';
    document.getElementById('spellHint').textContent='';
    document.getElementById('spellInput').style.display='none';
    document.getElementById('spellBtn').style.display='none';
    if(spellCorrect===spellTotal) triggerConfetti();
    return;
  }
  const w=spellWords[spellIndex];
  document.getElementById('spellMeaning').textContent=w.meaning||w.word;
  document.getElementById('spellHint').textContent='';
  document.getElementById('spellResult').textContent='';
  document.getElementById('spellResult').className='spell-result';
  document.getElementById('spellStats').textContent=`正确 ${spellCorrect} / 总 ${spellTotal}${spellTotal>0?' ('+Math.round(spellCorrect/spellTotal*100)+'%)':''}`;
  document.getElementById('spellInput').value='';
  document.getElementById('spellInput').style.display='';
  document.getElementById('spellBtn').style.display='';
  document.getElementById('spellInput').focus();
  // Auto-speak after short delay
  setTimeout(()=>speakSpellWord(),600);
}

function checkSpelling(){
  if(spellIndex>=spellWords.length) return;
  const w=spellWords[spellIndex];
  const inp=(document.getElementById('spellInput').value||'').trim().toLowerCase();
  const correct=w.word.toLowerCase();
  spellTotal++;
  const resultEl=document.getElementById('spellResult');
  if(inp===correct){
    spellCorrect++;
    resultEl.textContent='✅ 正确!';
    resultEl.className='spell-result correct';
  }else{
    resultEl.innerHTML='❌ 正确答案: <b>'+w.word+'</b>';
    resultEl.className='spell-result wrong';
    // Save to error book
    if(!spellingErrors[w.word]) spellingErrors[w.word]={count:0,word:w.word};
    spellingErrors[w.word].count++;
    spellingErrors[w.word].lastWrong=todayStr();
    localStorage.setItem('spelling_errors',JSON.stringify(spellingErrors));
  }
  document.getElementById('spellStats').textContent=`正确 ${spellCorrect} / 总 ${spellTotal} (${Math.round(spellCorrect/spellTotal*100)}%)`;
  spellIndex++;
  setTimeout(()=>showSpellWord(),1000);
}

// Enter key to submit spelling
document.getElementById('spellInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkSpelling();});

// ============ KEYBOARD ============
const KMAP={ArrowLeft:'kL',ArrowRight:'kR',' ':'kSp','1':'k1','2':'k2'};
function flashKbd(key){const id=KMAP[key];if(!id)return;const el=document.getElementById(id);if(!el)return;el.classList.add('active-key');setTimeout(()=>el.classList.remove('active-key'),250);}
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.ctrlKey||e.metaKey){
    if(e.key==='1'){e.preventDefault();switchSection('roots_affixes');}
    else if(e.key==='2'){e.preventDefault();switchSection('high_frequency');}
    else if(e.key==='3'){e.preventDefault();switchSection('essential');}
    return;
  }
  flashKbd(e.key);
  if(e.key==='ArrowLeft') prevCard(e);
  else if(e.key==='ArrowRight') nextCard(e);
  else if(e.key===' '){e.preventDefault();flipCard();}
  else if(e.key==='1') markWord('known',e);
  else if(e.key==='2') markWord('learning',e);
});

// ============ GLOBAL SEARCH ============
let searchIndex=[];
function buildSearchIndex(){
  searchIndex=[];
  for(const sid of Object.keys(sections)){
    const cats=sections[sid].categories;
    for(let ci=0;ci<cats.length;ci++){
      const words=cats[ci].words;
      for(let wi=0;wi<words.length;wi++){
        const w=words[wi];
        searchIndex.push({section:sid,label:sections[sid].label,catIdx:ci,wordIdx:wi,word:w.word,meaning:w.meaning,phonetic:w.phonetic});
      }
    }
  }
}
function searchGlobal(){
  const q=(document.getElementById('globalSearch').value||'').trim().toLowerCase();
  const res=document.getElementById('globalResults');
  if(!q){res.style.display='none';return;}
  const matches=searchIndex.filter(e=>e.word.toLowerCase().includes(q)||(e.meaning||'').toLowerCase().includes(q)).slice(0,30);
  if(matches.length===0){res.innerHTML='<div class="gres-empty">未找到匹配单词</div>';res.style.display='';return;}
  res.innerHTML=matches.map(e=>`<div class="gres-item" onclick="navigateToWord('${e.section}',${e.catIdx},${e.wordIdx})">
    <span class="gr-word">${e.word}</span>
    <span class="gr-meaning">${e.meaning||''}</span>
    <span class="gr-loc">${e.label} ›</span>
  </div>`).join('');
  res.style.display='';
}
function navigateToWord(sid,catIdx,wordIdx){
  if(currentSection!==sid) switchSection(sid);
  selectCategory(catIdx);
  currentWordIndex=wordIdx;
  buildFilteredWords();
  // Find in filteredWords
  const cat=currentCategory();
  const w=cat.words[wordIdx];
  const found=filteredWords.findIndex(fw=>fw.word===w.word);
  filteredIdx=found>=0?found:0;
  if(currentMode!=='flashcard') switchMode('flashcard');
  else renderCard();
  document.getElementById('globalResults').style.display='none';
  document.getElementById('globalSearch').value='';
}
// Close search on outside click
document.addEventListener('click',function(e){
  const wrap=document.getElementById('globalSearchWrap');
  if(wrap&&!wrap.contains(e.target)) document.getElementById('globalResults').style.display='none';
});
